name: Scheduled Prediction Sweep

on:
  schedule:
    # Runs at 03:45 UTC (9:15 AM IST)
    - cron: '45 3 * * *'
    # Runs at 05:00 UTC (10:30 AM IST)
    - cron: '0 5 * * *'
    # Runs at 07:00 UTC (12:30 PM IST)
    - cron: '0 7 * * *'
    # Runs at 10:00 UTC (3:30 PM IST)
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  trigger-prediction:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render backend (handles cold start)
        run: |
          # Strip trailing slash to prevent URL malformat error
          BASE_URL="${{ secrets.BACKEND_URL }}"
          BASE_URL="${BASE_URL%/}"
          echo "Pinging: $BASE_URL/health"
          curl --retry 5 \
               --retry-delay 15 \
               --retry-all-errors \
               --max-time 60 \
               -s -o /dev/null \
               "$BASE_URL/health" || true
          echo "Waiting 50 seconds for backend to fully start..."
          sleep 50

      - name: Trigger Backend Prediction Sweep
        run: |
          BASE_URL="${{ secrets.BACKEND_URL }}"
          BASE_URL="${BASE_URL%/}"
          echo "Triggering: $BASE_URL/predict/run-predictions"

          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
               --max-time 60 \
               -X POST "$BASE_URL/predict/run-predictions" \
               -H "Content-Type: application/json" || echo "000")

          BODY=$(cat /tmp/response.txt 2>/dev/null || echo "no response")
          echo "Response code: $HTTP_CODE"
          echo "Response body: $BODY"
          echo "Trigger sent. Check Render logs for prediction progress."

