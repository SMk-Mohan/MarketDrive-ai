services:
  - type: web
    name: marketdrive-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GROQ_API_KEY
        sync: false
      - key: MARKETAUX_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
